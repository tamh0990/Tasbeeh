
workflows:
  ios-app-store:
    name: FINAL FAILSAFE BUILD
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: tesbeen-new

    environment:
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        DEVELOPMENT_TEAM: "YTHCWB78HY"

    scripts:
      - name: FULL CLEAN
        script: |
          echo "Cleaning..."
          rm -rf ios/App/build || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true

      - name: INSTALL
        script: npm install

      - name: BUILD WEB
        script: npm run build

      - name: SYNC IOS
        script: npx cap sync ios

      - name: POD INSTALL
        script: |
          cd ios/App
          pod install --repo-update
          cd ../..

      - name: FIX SIGNING (AUTO)
        script: |
          echo "Fix signing..."
          keychain initialize

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create || true

          keychain add-certificates || true
          xcode-project use-profiles || true

          # force automatic
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' ios/App/App.xcodeproj/project.pbxproj || true

      - name: BUILD TRY 1 (xcode-project)
        script: |
          echo "Try build method 1..."
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" || echo "FAILED_1"

      - name: BUILD TRY 2 (xcodebuild fallback)
        script: |
          echo "Try build method 2..."

          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

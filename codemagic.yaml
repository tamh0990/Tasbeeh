workflows:
  ios-app-store:
    name: iOS App Store Build

    integrations:
      app_store_connect: tesbeen-new

    environment:
      vars:
        BUNDLE_ID: com.harbi.tasbeehapp

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.harbi.tasbeehapp

    scripts:
      - name: Install Node modules
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install pods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID"
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APPLE_DEVELOPER_TEAM_ID: "YTHCWB78HY"
        EXPORT_OPTIONS_PATH: "ios/App/exportOptions.plist"

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Set up code signing
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/key.p8
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key @/tmp/key.p8 \
            --create
          xcode-project use-profiles

      - name: Build and export IPA
        script: |
          # بناء الأرشفة
          xcodebuild clean archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_DEVELOPER_TEAM_ID" \
            -allowProvisioningUpdates

          # تصدير IPA باستخدام ملف exportOptions الموجود في المستودع
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH" \
            -exportPath build/ios/ipa

          # التأكد من وجود ملف IPA
          if [ ! -f build/ios/ipa/*.ipa ]; then
            echo "❌ لم يتم إنشاء IPA"
            exit 1
          fi
          echo "✅ IPA created successfully"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/App.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

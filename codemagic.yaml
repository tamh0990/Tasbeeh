workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: tesbeen-new 
    environment:
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        # تأكدنا أن المسار يبدأ من المجلد الصحيح لـ Capacitor
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set build version
        script: agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Install pods
        script: |
          cd ios/App
          pod install
      - name: Setup signing
        script: |
          keychain initialize
          cat <<EOF > /tmp/key.p8
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgMle0MibP0u9RGLIf
          dghjvovUYNrS3OfSIsrk+ipHOw2gCgYIKoZIzj0DAQehRANCAAQSfht7Oc5Z/Xsz
          1D9asORMhwK4CriEEmA6iG+dfSN26ouan3mbYtWnw0XfOVojA4EyvbFLezEf0HWp
          iDodPtGK
          -----END PRIVATE KEY-----
          EOF
          
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "69a6de9e-213c-47e3-e053-5b8c7c11a4d1" \
            --key-id "L23H89NSR3" \
            --private-key @/tmp/key.p8 \
            --create
          keychain add-certificates
      - name: Build IPA
        script: |
          # الانتقال لمجلد المشروع قبل البناء لضمان العثور على الـ Scheme
          cd ios/App
          xcode-project use-profiles --export-method app-store
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

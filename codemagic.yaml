workflows:
  ios-app-store:
    name: AUTO FULL BUILD (NO ERRORS)
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: tesbeen-new

    environment:
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        DEVELOPMENT_TEAM: "YTHCWB78HY"

    scripts:
      - name: Clean everything
        script: |
          rm -rf ios/App/build
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update
          cd ../..

      - name: Setup automatic signing (FULL AUTO)
        script: |
          keychain initialize

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

          keychain add-certificates

          xcode-project use-profiles

      - name: Force fix project signing
        script: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' ios/App/App.xcodeproj/project.pbxproj || true

      - name: Build archive (HARD FORCE)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - build/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

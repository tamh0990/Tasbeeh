 workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: tesbeen-new 
    environment:
      groups:
        - appstore
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install pods
        script: |
          cd ios/App
          pod install
      - name: Setup signing
        script: |
          keychain initialize
          # جلب أحدث شهادات التوزيع من حسابك في آبل تلقائياً
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Build IPA
        script: |
          # الخطوة السحرية: إجبار المشروع على استخدام بروفايل المتجر وتجاهل الإعدادات اليدوية
          xcode-project use-profiles --export-method app-store
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --clean
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true


workflows:
  ios-app-store:
    name: FINAL FIX BUILD
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: tesbeen-new

    environment:
      groups:
        - appstore
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        DEVELOPMENT_TEAM: "YTHCWB78HY"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Fix iOS target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/App/App.xcodeproj/project.pbxproj || true

      - name: Install pods
        script: |
          cd ios/App
          pod install

      # 🔥 أهم خطوة (إجبار التوقيع)
      - name: FORCE SIGNING FIX
        script: |
          keychain initialize

          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/key.p8

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key @/tmp/key.p8

          keychain add-certificates

          xcode-project use-profiles

      # 🔥 البناء اليدوي (بديل أقوى من xcode-project)
      - name: BUILD IPA (FINAL FIX)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - build/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

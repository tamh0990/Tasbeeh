workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore # الخطوة الأهم: هنا نقوم بمناداة المتغيرات الأربعة التي في صورتك
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APPLE_DEVELOPER_TEAM_ID: "YTHCWB78HY"
      node: 20
      xcode: 15.4 # حددنا إصدار مستقر
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Set up code signing settings
        script: |
          # هذا السطر السحري هو الذي يحل مشكلة No profiles found
          app-store-connect fetch-signing-data "$BUNDLE_ID" --create
          xcode-project use-profiles

      - name: Build and archive for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration # يستخدم الربط الذي سنفعله في الخطوة القادمة
        submit_to_testflight: true

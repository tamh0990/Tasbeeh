workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: tesbeen-new 

    environment:
      node: 18
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
      groups:
        - app_store_credentials

    cache:
      cache_paths:
        - ~/.npm
        - ios/Pods

    scripts:

      - name: Install dependencies
        script: npm ci

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios --deployment

      # 🔴 حل المشكلة هنا
      - name: Set build version
        script: |
          cd ios/App
          agvtool new-version -all $CM_BUILD_NUMBER

      - name: Install pods
        script: |
          cd ios/App
          rm -rf Pods Podfile.lock
          pod install

      - name: Setup signing
        script: |
          keychain initialize
          echo "$APP_STORE_PRIVATE_KEY" > /tmp/key.p8

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_ISSUER_ID" \
            --key-id "$APP_STORE_KEY_ID" \
            --private-key @/tmp/key.p8 \
            --create

          keychain add-certificates

      - name: Build IPA
        script: |
          cd ios/App

          xcode-project use-profiles --export-method app-store

          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

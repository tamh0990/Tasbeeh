workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120

    integrations:
      app_store_connect: tesbeen-new

    environment:
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.harbi.tasbeehapp

    scripts:

      - name: Install dependencies
        script: |
          npm install

      - name: Build web
        script: |
          npm run build || echo "skip build"

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install pods
        script: |
          cd ios/App
          pod install

      - name: Setup signing (AUTO)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID"
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

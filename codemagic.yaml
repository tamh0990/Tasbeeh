workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: tesbeen-new

    environment:
      node: 20
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web
        script: npm run build

      - name: Sync Capacitor
        script: |
          rm -rf ios/App/Pods
          rm -rf ios/App/Podfile.lock
          npx cap sync ios

      - name: Install pods
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

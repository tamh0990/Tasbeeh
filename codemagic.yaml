workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore # تأكد أن هذا هو اسم المجموعة في Environment variables
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # هذا السطر سيقوم بجلب الشهادات وإنشاء الـ Profile آلياً باستخدام مفتاحك الجديد
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          cd ios/App && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --mode release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        # تأكد أن اسم المفتاح هنا مطابق تماماً للاسم في صفحة Integrations
        api_key_name: tesbeen-new

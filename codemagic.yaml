workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore 
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm run build
          npx cap sync ios
          cd ios/App && pod install --repo-update

      - name: Set up code signing (Check Points)
        script: |
          # فحص إذا كانت المتغيرات موجودة أصلاً لمنع الفشل الغامض
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then echo "خطأ: المفتاح السري غير موجود في الإعدادات"; exit 1; fi
          
          # الأمر الصحيح لنسخة كودماجيك الحالية
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create
          
          xcode-project use-profiles

      - name: Build and archive for App Store
        script: |
          # بناء التطبيق مع تحديد النوع لضمان تخطي خطأ 65
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --code-signing-method app-store

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

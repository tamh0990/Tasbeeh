workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: tesbeen-new

    environment:
      node: 20
      groups:
        - appstore   # 🔥 هذا أهم تعديل
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web
        script: npm run build

      - name: Debug & Clean
        script: |
          echo "===== SYSTEM INFO ====="
          node -v
          npm -v
          xcodebuild -version

          echo "===== CLEANING ====="
          rm -rf ios/App/Pods
          rm -rf ios/App/Podfile.lock

          echo "===== PROJECT STRUCTURE ====="
          ls -la ios
          ls -la ios/App

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install pods (Fix)
        script: |
          cd ios/App
          pod install --repo-update

      - name: Setup signing
        script: |
          cd ios/App
          xcode-project use-profiles

      - name: Debug signing
        script: |
          echo "===== PROFILES ====="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles || true

          echo "===== EXPORT FILE ====="
          ls -la /Users/builder || true

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

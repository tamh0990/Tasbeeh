workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - appstore
      vars:
        BUNDLE_ID: "com.harbi.tasbeehapp"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APPLE_DEVELOPER_TEAM_ID: "YTHCWB78HY"
        EXPORT_OPTIONS_PATH: "exportOptions.plist"
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: 🔍 التحقق من المتغيرات
        script: |
          echo "التحقق من متغيرات API..."
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] && echo "❌ ISSUER_ID مفقود" && exit 1
          [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] && echo "❌ KEY_ID مفقود" && exit 1
          [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] && echo "❌ PRIVATE_KEY مفقود" && exit 1
          echo "✅ المتغيرات سليمة"

      - name: 🔐 إعداد التوقيع (Fix مهم)
        script: |
          echo "إنشاء ملف private_key.p8..."
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > private_key.p8

          echo "جلب ملفات التوقيع من Apple..."
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key @private_key.p8 \
            --create

          echo "تطبيق ملفات التوقيع..."
          xcode-project use-profiles

      - name: 🏗️ بناء IPA
        script: |
          echo "إنشاء exportOptions.plist..."
          cat > "$EXPORT_OPTIONS_PATH" << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>app-store</string>
    <key>signingStyle</key>
    <string>automatic</string>
</dict>
</plist>
EOF

          echo "بناء التطبيق..."
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags "-destination generic/platform=iOS" \
            --export-options-plist "$EXPORT_OPTIONS_PATH"

      - name: 📦 التحقق من IPA
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ لم يتم إنشاء IPA"
            exit 1
          fi
          echo "✅ تم إنشاء IPA:"
          ls -lh "$IPA_PATH"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
